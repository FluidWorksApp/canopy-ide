<!doctype html>
<html>
  <head>
    <style>
      body { font-family: sans-serif; background: #1a1b26; color: #c9d1d9; padding: 40px; }
      .card { border: 1px solid #7aa2f7; border-radius: 12px; padding: 24px; max-width: 420px; }
      button { background: #7aa2f7; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>HTML preview test</h1>
      <p>Rendered natively in a sandboxed iframe. Script test:</p>
      <button onclick="this.textContent = 'clicked at ' + new Date().toLocaleTimeString()">
        Click me
      </button>
    </div>
  </body>
</html>
