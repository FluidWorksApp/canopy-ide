# Builds and releases Canopy for macOS and Linux.
#
# Tauri cannot cross-compile between operating systems (the linkers and the
# system webview are native), so each OS builds on its own runner. Windows and
# the Homebrew cask are deliberately not here yet.
#
# Trigger: push a tag (`git tag v0.1.0 && git push --tags`), or run it by hand
# from the Actions tab to get artifacts without cutting a release.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# tauri-action creates the release and uploads assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      # One platform failing shouldn't bin the artifacts of the others.
      fail-fast: false
      matrix:
        include:
          # macOS: both arches are built on the arm64 runner. Rust cross-compiles
          # to Intel fine, and prepare-sidecar.mjs builds the hook helper for the
          # same --target so an Intel app never ships an arm64 helper.
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          # 22.04, not latest: the glibc you build against is the *floor* for
          # what users can run. Building on 24.04 would exclude 22.04 users.
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows: NSIS only. `targets: "all"` would also attempt an MSI via
          # WiX, whose light.exe fails on the runner — and NSIS is the format
          # the updater is configured for (installMode: passive) anyway.
          # Unsigned for now — SmartScreen warns until an Authenticode
          # certificate is added.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc --bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf \
            xdg-utils \
            build-essential \
            curl wget file libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - run: npm ci

      # Import the signing certificate ourselves instead of letting Tauri do it.
      # Tauri's importer rejects any .p12 holding more than one identity
      # ("certificate from APPLE_CERTIFICATE ... does not match provided
      # identity"), and a Keychain Access / `security export` .p12 often carries
      # every identity in the login keychain. Importing here and signing purely
      # by APPLE_SIGNING_IDENTITY name sidesteps that: codesign picks the right
      # identity out of the keychain no matter what else the .p12 contains.
      - name: Import Apple signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not set — building unsigned."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 24)"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -f pkcs12 -T /usr/bin/codesign
          # Lets codesign use the key without an interactive password prompt.
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$CERT_PATH"

          # Fail here with a clear message rather than deep inside `tauri build`
          # if the identity the secrets name isn't actually in the .p12.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep -qF "$APPLE_SIGNING_IDENTITY"; then
            echo "::error::APPLE_SIGNING_IDENTITY not found in the imported .p12."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "Identity present in keychain."

      # ONNX Runtime is loaded dynamically on EVERY target (ort load-dynamic, see
      # Cargo.toml), so every build ships Microsoft's official runtime as an app
      # resource (bundle.resources: onnxruntime/* -> lib.rs sets ORT_DYLIB_PATH to
      # it). One mechanism everywhere avoids both static-prebuilt failures: Intel
      # macOS has no ort prebuilt, and the Linux prebuilt needs a too-new glibc.
      # v1.23.0 is the last release carrying every desktop arch (incl. osx x64),
      # and is inside ort rc.12's supported ONNX Runtime range (v1.17-v1.24).
      - name: Stage ONNX Runtime (all platforms, for load-dynamic)
        shell: bash
        run: |
          ORT_VER=1.23.0
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)     A=osx-arm64;  EXT=tgz; IN=libonnxruntime.${ORT_VER}.dylib; OUT=libonnxruntime.dylib ;;
            x86_64-apple-darwin)      A=osx-x86_64; EXT=tgz; IN=libonnxruntime.${ORT_VER}.dylib; OUT=libonnxruntime.dylib ;;
            x86_64-unknown-linux-gnu) A=linux-x64;  EXT=tgz; IN=libonnxruntime.so.${ORT_VER};    OUT=libonnxruntime.so ;;
            x86_64-pc-windows-msvc)   A=win-x64;    EXT=zip; IN=onnxruntime.dll;                 OUT=onnxruntime.dll ;;
            *) echo "::error::unmapped target ${{ matrix.target }}"; exit 1 ;;
          esac
          PKG="onnxruntime-${A}-${ORT_VER}"
          curl -fSL -o "$RUNNER_TEMP/ort.${EXT}" \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/${PKG}.${EXT}"
          # bsdtar (macOS/Windows) and GNU tar (Linux) both extract these; -z only
          # for the gzip tarballs, plain for the Windows zip.
          if [ "$EXT" = zip ]; then tar -xf "$RUNNER_TEMP/ort.zip" -C "$RUNNER_TEMP"; else tar -xzf "$RUNNER_TEMP/ort.${EXT}" -C "$RUNNER_TEMP"; fi
          mkdir -p src-tauri/onnxruntime
          cp "$RUNNER_TEMP/${PKG}/lib/${IN}" "src-tauri/onnxruntime/${OUT}"
          echo "Staged ONNX Runtime ${ORT_VER} (${A}) -> src-tauri/onnxruntime/${OUT}"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the update artifacts. Without this the build still succeeds but
          # produces no .sig, and installed copies will refuse the update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing + notarisation. The certificate itself is imported by
          # the "Import Apple signing certificate" step above — passing
          # APPLE_CERTIFICATE here would re-trigger Tauri's own import, which
          # chokes on a .p12 with more than one identity. Only the identity
          # name is passed; codesign resolves it from the imported keychain.
          # When these are unset the mac build is unsigned: it runs here, but
          # Gatekeeper blocks it on other people's machines.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Canopy __VERSION__"
          releaseBody: "See the assets below to download and install."
          # Draft: a release is public the moment it publishes, and the tag is
          # the only gate. Review before it reaches anyone.
          releaseDraft: true
          prerelease: false
          # Writes latest.json, which plugins.updater.endpoints points at.
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # `tauri build` exits 0 even when signing fails ("a public key has been
      # found, but no private key"), so a missing or bad secret would publish a
      # release whose update artifacts have no .sig — and every installed copy
      # would silently refuse to update. Fail here instead.
      - name: Verify updater artifacts are signed
        shell: bash
        run: |
          root="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ -d "$root" ] || root="src-tauri/target/release/bundle"
          echo "looking under $root"
          sigs=$(find "$root" -name '*.sig' | wc -l | tr -d ' ')
          find "$root" -name '*.sig' -print
          if [ "$sigs" -eq 0 ]; then
            echo "::error::No .sig produced — updater artifacts are unsigned."
            echo "Set the TAURI_SIGNING_PRIVATE_KEY secret (and"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD, empty string if the key has none)."
            exit 1
          fi
          echo "$sigs updater signature(s) present"

      # Tauri versions its filenames (Canopy_0.1.0_aarch64.dmg), but
      # `releases/latest/download/<name>` only resolves names that are identical
      # in every release. So each release also carries a version-less alias of
      # every installer — the permanent URLs canopyide.dev and the README link:
      #   https://github.com/FluidWorksApp/canopy-ide/releases/latest/download/Canopy-macos-arm64.dmg
      # Keep these names in lockstep with the website's downloads page and the
      # README table. When the Windows build lands, its alias should be
      # Canopy-windows-x86_64-setup.exe.
      - name: Upload stable-name download aliases
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          root="src-tauri/target/${{ matrix.target }}/release/bundle"
          [ -d "$root" ] || root="src-tauri/target/release/bundle"
          stage="$(mktemp -d)"
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              cp "$root"/dmg/Canopy_*.dmg "$stage/Canopy-macos-arm64.dmg" ;;
            x86_64-apple-darwin)
              cp "$root"/dmg/Canopy_*.dmg "$stage/Canopy-macos-intel.dmg" ;;
            x86_64-unknown-linux-gnu)
              cp "$root"/appimage/*.AppImage "$stage/Canopy-linux-x86_64.AppImage"
              cp "$root"/deb/*.deb          "$stage/Canopy-linux-x86_64.deb"
              cp "$root"/rpm/*.rpm          "$stage/Canopy-linux-x86_64.rpm" ;;
            x86_64-pc-windows-msvc)
              cp "$root"/nsis/*-setup.exe   "$stage/Canopy-windows-x86_64-setup.exe" ;;
          esac
          ls -l "$stage"
          # The release is still a draft at this point; gh resolves drafts by
          # tag name. --clobber makes a re-run of the workflow idempotent.
          gh release upload "${{ github.ref_name }}" "$stage"/* --clobber
          rm -rf "$stage"
